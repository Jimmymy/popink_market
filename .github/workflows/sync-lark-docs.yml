name: Sync Docs To Lark

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync docs into Lark document
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_DOC_ID: ${{ secrets.LARK_DOC_ID }}
          LARK_DOC_URL: ${{ secrets.LARK_DOC_URL }}
          LARK_DOC_TITLE: ${{ secrets.LARK_DOC_TITLE }}
          LARK_DOC_FOLDER_TOKEN: ${{ secrets.LARK_DOC_FOLDER_TOKEN }}
          LARK_BASE_URL: ${{ secrets.LARK_BASE_URL }}
          SYNC_SOURCES: SPEC.md
        run: npm run docs:sync:lark
