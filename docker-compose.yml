services:
  postgres:
    image: postgres:16-alpine
    container_name: popink_market_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: popink_market
    ports:
      - "5432:5432"
    volumes:
      - popink_market_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d popink_market"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: popink_market_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - popink_market_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  popink_market_postgres:
  popink_market_redis:
